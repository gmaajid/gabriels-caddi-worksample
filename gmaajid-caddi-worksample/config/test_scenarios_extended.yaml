    ma_event: "ma-81cb6c"
    order_date: "2023-05-31"
    description: "Merger name used one day BEFORE event — should NOT resolve via M&A"

  # --- Partial M&A name with noise ---
  - id: EX-309
    difficulty: 3
    category: post_acquisition
    input_name: "AQF Holdings Inc."
    expected_canonical: "Apex Manufacturing"
    requires_ma_registry: true
    ma_event: "ma-1c52b8"
