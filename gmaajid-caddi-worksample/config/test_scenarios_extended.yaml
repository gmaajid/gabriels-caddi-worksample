metadata:
  generated: "2026-03-27"
  description: "Extended ground truth for entity resolution — 50+ scenarios covering OCR, unicode, word order, combined errors, division variants, temporal edge cases, and adversarial false-positive traps"
  extends: "test_scenarios.yaml"
  note: "These supplement the original 19 scenarios (SC-001 to SC-032). Run alongside or independently."

scenarios:
  # ==========================================================================
  # TIER 1: Easy (high token/embedding overlap, no M&A needed)
  # ==========================================================================

  # --- Abbreviation variants ---
  - id: EX-101
    difficulty: 1
    category: abbreviation
    input_name: "Apex Mfg Inc"
    expected_canonical: "Apex Manufacturing"
    requires_ma_registry: false
    description: "Abbreviation + legal suffix combined"

  - id: EX-102
    difficulty: 1
    category: abbreviation
    input_name: "PRECISION THERMAL"
    expected_canonical: "Precision Thermal Co"
    requires_ma_registry: false
    description: "Missing 'Co' suffix entirely"

  - id: EX-103
    difficulty: 1
    category: abbreviation
    input_name: "TITANFORGE L.L.C."
    expected_canonical: "TitanForge LLC"
    requires_ma_registry: false
    description: "Dotted legal suffix"

  - id: EX-104
    difficulty: 1
    category: abbreviation
    input_name: "Stellar Metal Works"
    expected_canonical: "Stellar Metalworks"
    requires_ma_registry: false
    description: "Compound word split into two"

  # --- Case variations ---
  - id: EX-105
    difficulty: 1
