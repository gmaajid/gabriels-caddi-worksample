    input_name: "Apex  Manufacturing"
    expected_canonical: "Apex Manufacturing"
    requires_ma_registry: false
    description: "Double space"

  - id: EX-109
    difficulty: 1
    category: whitespace
    input_name: " QuickFab Industries "
