  - id: EX-310
    difficulty: 3
    category: post_acquisition
    input_name: "Apex Manufacturing (formerly QuickFab)"
    expected_canonical: "Apex Manufacturing"
    requires_ma_registry: false
    description: "Parenthetical former name — clustering should handle via Apex token"

  # ==========================================================================
  # TIER 4: Adversarial (zero overlap, false positive traps, ambiguity)
  # ==========================================================================

  # --- False positive traps (similar names, DIFFERENT companies) ---
  - id: EX-401
    difficulty: 4
    category: false_positive_trap
    input_name: "Apex Farms LLC"
